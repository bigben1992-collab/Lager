<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f4f9; margin: 0; padding: 20px; }
        #reader { width: 100%; max-width: 500px; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .info-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 20px; width: 100%; max-width: 460px; }
        #instruction { font-weight: bold; color: #007bff; margin-bottom: 15px; min-height: 1.2em; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .data-label { color: #666; }
        .data-value { font-weight: bold; color: #000; }
        #val-bestand { color: #d63384; font-size: 1.2em; }
        #action-buttons { display: none; gap: 10px; margin-top: 20px; width: 100%; max-width: 500px; }
        button { flex: 1; padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; transition: opacity 0.2s; }
        .btn-einlagern { background-color: #28a745; }
        .btn-auslagern { background-color: #dc3545; }
        button:disabled { cursor: not-allowed; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="reader"></div>

    <div class="info-box">
        <div id="instruction">SCHRITT 1: Lagerplatz scannen</div>
        <div class="data-row">
            <span class="data-label">Lagerplatz:</span>
            <span id="val-platz" class="data-value">---</span>
        </div>
        <div class="data-row">
            <span class="data-label">Ware:</span>
            <span id="val-ware" class="data-value">---</span>
        </div>
        <div class="data-row">
            <span class="data-label">Aktueller Bestand:</span>
            <span id="val-bestand" class="data-value">---</span>
        </div>
    </div>

    <div id="action-buttons">
        <button class="btn-einlagern" onclick="sendToSheet('EINLAGERN')">EINLAGERN</button>
        <button class="btn-auslagern" onclick="sendToSheet('AUSLAGERN')">AUSLAGERN</button>
    </div>

    <script>
        let lagerplatz = null;
        let ware = null;
        let isWaiting = false;
        
        // --- DEINE URL HIER EINTRAGEN ---
        const webAppUrl = "https://script.google.com/macros/s/AKfycbxJjlJgtCAQjlqO09Di0DFrAkROJMNF1v48-4CV51Rzjldav3OHHaVMiP9Gc6gIVC1uWA/exec";

        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        function onScanSuccess(decodedText) {
            if (isWaiting) return;

            if (!lagerplatz) {
                lagerplatz = decodedText;
                document.getElementById('val-platz').innerText = lagerplatz;
                isWaiting = true;
                html5QrCode.pause(true);
                
                document.getElementById('instruction').innerText = "Warte 2 Sekunden...";
                document.getElementById('instruction').style.color = "orange";
                
                setTimeout(() => {
                    isWaiting = false;
                    html5QrCode.resume();
                    document.getElementById('instruction').innerText = "SCHRITT 2: Ware scannen";
                    document.getElementById('instruction').style.color = "#28a745";
                    if(navigator.vibrate) navigator.vibrate(100); 
                }, 2000);

            } else if (!ware) {
                if (decodedText === lagerplatz) return; 
                ware = decodedText;
                document.getElementById('val-ware').innerText = ware;
                fetchBestand();
                if(navigator.vibrate) navigator.vibrate(100);
            }
        }

        async function fetchBestand() {
            const instruction = document.getElementById('instruction');
            instruction.innerText = "Bestand wird abgefragt...";
            instruction.style.color = "orange";

            try {
                // Fetch mit Redirect-Handling für Google Apps Script
                const url = `${webAppUrl}?action=getBestand&platz=${encodeURIComponent(lagerplatz)}&ware=${encodeURIComponent(ware)}`;
                const response = await fetch(url);
                const data = await response.json();
                
                document.getElementById('val-bestand').innerText = data.bestand !== undefined ? data.bestand : "0";
                instruction.innerText = "Aktion wählen";
                instruction.style.color = "#000";
                document.getElementById('action-buttons').style.display = "flex";
            } catch (err) {
                console.error("Fehler:", err);
                document.getElementById('val-bestand').innerText = "0";
                instruction.innerText = "Bestand neu angelegt";
                document.getElementById('action-buttons').style.display = "flex";
            }
        }

        function sendToSheet(typ) {
            const params = `?platz=${encodeURIComponent(lagerplatz)}&ware=${encodeURIComponent(ware)}&typ=${typ}`;
            const instruction = document.getElementById('instruction');
            
            document.querySelector('.btn-einlagern').disabled = true;
            document.querySelector('.btn-auslagern').disabled = true;
            instruction.innerText = "Übertragung...";

            fetch(webAppUrl + params, { mode: 'no-cors' })
                .then(() => {
                    alert(`${typ} erfolgreich gebucht!`);
                    resetScanner();
                })
                .catch(err => {
                    alert("Fehler: " + err);
                    resetScanner();
                });
        }

        function resetScanner() {
            lagerplatz = null;
            ware = null;
            isWaiting = false;
            document.getElementById('val-platz').innerText = "---";
            document.getElementById('val-ware').innerText = "---";
            document.getElementById('val-bestand').innerText = "---";
            document.getElementById('instruction').innerText = "SCHRITT 1: Lagerplatz scannen";
            document.getElementById('instruction').style.color = "#007bff";
            document.getElementById('action-buttons').style.display = "none";
            document.querySelector('.btn-einlagern').disabled = false;
            document.querySelector('.btn-auslagern').disabled = false;
            html5QrCode.resume();
        }

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
    </script>
</body>
</html>
