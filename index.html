<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lager-Finder & Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f4f9; margin: 0; padding: 20px; }
        #reader { width: 100%; max-width: 500px; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .info-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 20px; width: 100%; max-width: 460px; }
        #instruction { font-weight: bold; color: #d63384; margin-bottom: 15px; min-height: 1.2em; text-transform: uppercase; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .data-label { color: #666; }
        .data-value { font-weight: bold; color: #000; }
        .highlight { color: #007bff; font-size: 1.2em; }
        #action-buttons { display: none; gap: 10px; margin-top: 20px; width: 100%; max-width: 500px; }
        button { flex: 1; padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; }
        .btn-einlagern { background-color: #28a745; }
        .btn-auslagern { background-color: #dc3545; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>

    <div id="reader"></div>

    <div class="info-box">
        <div id="instruction">SCHRITT 1: Ware scannen</div>
        <div class="data-row">
            <span class="data-label">Ware:</span>
            <span id="val-ware" class="data-value">---</span>
        </div>
        <div class="data-row">
            <span class="data-label">Empfohlener Platz:</span>
            <span id="val-info-platz" class="data-value highlight">---</span>
        </div>
        <div class="data-row">
            <span class="data-label">Gesamtbestand:</span>
            <span id="val-bestand" class="data-value">---</span>
        </div>
        <hr>
        <div class="data-row">
            <span class="data-label">Gescannter Platz:</span>
            <span id="val-platz" class="data-value">---</span>
        </div>
    </div>

    <div id="action-buttons">
        <button class="btn-einlagern" onclick="sendToSheet('EINLAGERN')">EINLAGERN</button>
        <button class="btn-auslagern" onclick="sendToSheet('AUSLAGERN')">AUSLAGERN</button>
    </div>

    <script>
        let ware = null;
        let lagerplatz = null;
        let isWaiting = false;
        
        // --- DEINE URL HIER EINTRAGEN ---
        const webAppUrl = "https://script.google.com/macros/s/AKfycbxOwfbvG3azVEuoHWQrd8jsl5TyPoieEudrdrC7v_8QDUN7ZkOfjzpr1StIoGQcwnR1ag/exec";

        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        async function onScanSuccess(decodedText) {
            if (isWaiting) return;

            if (!ware) {
                // SCHRITT 1: Ware erkannt
                ware = decodedText;
                document.getElementById('val-ware').innerText = ware;
                await fetchWarensinfo();
            } else if (!lagerplatz) {
                // SCHRITT 2: Lagerplatz zur Bestätigung gescannt
                lagerplatz = decodedText;
                document.getElementById('val-platz').innerText = lagerplatz;
                document.getElementById('instruction').innerText = "Aktion wählen";
                document.getElementById('instruction').style.color = "#000";
                document.getElementById('action-buttons').style.display = "flex";
                if(navigator.vibrate) navigator.vibrate(100);
            }
        }

        async function fetchWarensinfo() {
            isWaiting = true;
            const instruction = document.getElementById('instruction');
            instruction.innerText = "Suche Ware im System...";
            
            try {
                const response = await fetch(`${webAppUrl}?action=getInfo&ware=${encodeURIComponent(ware)}`);
                const data = await response.json();
                
                document.getElementById('val-info-platz').innerText = data.platz;
                document.getElementById('val-bestand').innerText = data.bestand;
                
                instruction.innerText = "SCHRITT 2: Lagerplatz scannen";
                instruction.style.color = "#007bff";
                
                if(navigator.vibrate) navigator.vibrate(100);
                
                // Kurze Pause, damit der User das Ergebnis sieht, bevor der Scanner den Platz nimmt
                setTimeout(() => { isWaiting = false; }, 1500);
            } catch (err) {
                console.error(err);
                instruction.innerText = "Ware unbekannt - Platz scannen";
                isWaiting = false;
            }
        }

        function sendToSheet(typ) {
            const params = `?platz=${encodeURIComponent(lagerplatz)}&ware=${encodeURIComponent(ware)}&typ=${typ}`;
            document.getElementById('instruction').innerText = "Buchung läuft...";
            
            fetch(webAppUrl + params, { mode: 'no-cors' })
                .then(() => {
                    alert(`${typ} erfolgreich!`);
                    resetScanner();
                });
        }

        function resetScanner() {
            ware = null;
            lagerplatz = null;
            document.getElementById('val-ware').innerText = "---";
            document.getElementById('val-info-platz').innerText = "---";
            document.getElementById('val-bestand').innerText = "---";
            document.getElementById('val-platz').innerText = "---";
            document.getElementById('instruction').innerText = "SCHRITT 1: Ware scannen";
            document.getElementById('instruction').style.color = "#d63384";
            document.getElementById('action-buttons').style.display = "none";
            isWaiting = false;
        }

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
    </script>
</body>
</html>
