<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lager-Profi Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #reader { width: 100%; max-width: 400px; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .status-card { background: white; padding: 20px; border-radius: 10px; width: 100%; max-width: 400px; margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .step { font-weight: bold; color: #007bff; }
        .data-display { font-size: 1.2em; margin: 10px 0; }
        button { padding: 15px 20px; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; margin-bottom: 10px; }
        .btn-in { background: #28a745; }
        .btn-out { background: #ffc107; color: black; }
        .reset { background: #dc3545; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Lager-Buchungssystem</h2>
    
    <div id="reader"></div>

    <div class="status-card">
        <div id="instruction" class="step">SCHRITT 1: Lagerplatz scannen</div>
        <div class="data-display">
            Lagerplatz: <span id="val-platz">---</span><br>
            Ware: <span id="val-ware">---</span>
        </div>
        
        <div id="action-buttons" style="display:none;">
            <button class="btn-in" onclick="sendToSheet('EINGANG')">Ware einlagern (+)</button>
            <button class="btn-out" onclick="sendToSheet('AUSGANG')">Ware entnehmen (-)</button>
        </div>
        
        <button class="reset" onclick="resetScanner()">Scan zurücksetzen</button>
    </div>

    <script>
        let lagerplatz = null;
        let ware = null;
        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        function onScanSuccess(decodedText) {
            if (!lagerplatz) {
                lagerplatz = decodedText;
                document.getElementById('val-platz').innerText = lagerplatz;
                document.getElementById('instruction').innerText = "SCHRITT 2: Ware scannen";
                document.getElementById('instruction').style.color = "#28a745";
            } else if (!ware) {
                ware = decodedText;
                document.getElementById('val-ware').innerText = ware;
                document.getElementById('instruction').innerText = "SCHRITT 3: Aktion wählen";
                document.getElementById('action-buttons').style.display = "block";
                if (navigator.vibrate) navigator.vibrate(100);
            }
        }

        function sendToSheet(typ) {
            // ERSETZE DIESE URL DURCH DEINE GOOGLE WEB APP URL
            const webAppUrl = "https://script.google.com/macros/s/AKfycby9D-uMQ4FB97Cgg4KHfB6p7JGQD0SXwmBGrcZAqwSW1JntXIUJbvpOUnAHCb_dPZjyAA/exec";
            
            const params = `?platz=${encodeURIComponent(lagerplatz)}&ware=${encodeURIComponent(ware)}&typ=${typ}`;
            
            // mode: 'no-cors' verhindert Fehlermeldungen beim Senden an Google
            fetch(webAppUrl + params, { mode: 'no-cors' })
                .then(() => {
                    alert(`${typ} erfolgreich an Google gesendet!`);
                    resetScanner();
                })
                .catch(err => alert("Fehler: " + err));
        }

        function resetScanner() {
            lagerplatz = null;
            ware = null;
            document.getElementById('val-platz').innerText = "---";
            document.getElementById('val-ware').innerText = "---";
            document.getElementById('instruction').innerText = "SCHRITT 1: Lagerplatz scannen";
            document.getElementById('instruction').style.color = "#007bff";
            document.getElementById('action-buttons').style.display = "none";
        }

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
    </script>
</body>
</html>
